services:
  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    environment:
      - HOME=/tmp
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_KEY=${SUPABASE_KEY}
      - CHAT_MODEL_NAME=${CHAT_MODEL_NAME}
      - CHAT_MODEL_PROVIDER=${CHAT_MODEL_PROVIDER}
      - ENRICHMENT_MODEL_NAME=${ENRICHMENT_MODEL_NAME:-}
      - ENRICHMENT_MODEL_PROVIDER=${ENRICHMENT_MODEL_PROVIDER:-}
      - EMBEDDINGS_MODEL=${EMBEDDINGS_MODEL}
      - EMBEDDINGS_PROVIDER=${EMBEDDINGS_PROVIDER}
      - RERANKER_MODEL=${RERANKER_MODEL}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - DO_PICTURE_DESCRIPTION=${DO_PICTURE_DESCRIPTION:-false}
      - OLLAMA_HOST=${OLLAMA_URL:-}
      - OLLAMA_URL=${OLLAMA_URL:-}
      - VLM_MODEL=${VLM_MODEL:-}
      - OLLAMA_CONTEXT_WINDOW=${OLLAMA_CONTEXT_WINDOW:-}
      - OLLAMA_REASONING=${OLLAMA_REASONING:-false}
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "python", "-c", "import urlib.request; urlib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
  
  frontend:
    build:
      context: ./frontend
    ports:
      - "8501:8501"
    environment:
      - HOME=/tmp
      - API_URL=http://backend:8000
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      -no-new-privileges:true
    depends_on:
      backend:
        condition: service_healthy